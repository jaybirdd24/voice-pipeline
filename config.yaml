# voice-pipeline configuration
# Paths point into the p4p workspace — adjust if you move things.

qwen3_model: "Qwen/Qwen3-TTS-12Hz-0.6B-Base"
device: "cuda:0"
dtype: "bfloat16"

# Where generated datasets land (relative to this file, or absolute)
datasets_dir: "/home/jay/p4p/datasets"

# Piper training workspace
piper_repo: "/home/jay/p4p/piper_training/repo/piper1-gpl"
piper_training_output_dir: "/home/jay/p4p/piper_training"

# Fallback server
fallback:
  cache_dir: "/home/jay/voice-pipeline/fallback/cache"
  host: "0.0.0.0"
  port: 8000

languages:
  en:
    qwen_language: "English"
    reference_audio: "/home/jay/p4p/reference/1min_32k.wav"
    # Matched transcript of 1min_32k.wav (64.85s @ 32kHz) — the "Milo the robot" reading.
    # Kept verbatim from reference/1min.txt so it exactly matches the spoken audio.
    reference_transcript: |-
      One quiet evening, a small robot named Milo found a silver key beside the garden gate.
      The key was cold and shiny, and it had a tiny moon carved into one side.
      Milo picked it up carefully and said, "I wonder what this opens?"
      Just then, a little orange cat jumped onto the stone path and looked at the key.
      The cat blinked twice, flicked its tail, and walked toward an old wooden door at the end of the garden.
      "Wait for me," said Milo. "Do you know where this door leads?"
      The sky was turning orange, the wind was soft, and the flowers moved gently from side to side.
      Somewhere nearby, a bird began to sing, and the whole garden felt calm and full of secrets.
      Milo took a deep breath, held the key up to the lock, and smiled.
      "If we are brave, and if we stay together, maybe we will find something wonderful."
      The cat gave a tiny meow.
      So Milo turned the key, pushed the door open, and stepped into a brand-new adventure.
    corpus: "/home/jay/p4p/piper_training/LJSpeech-1.1/metadata.csv"
    espeak_voice: "en-GB-x-rp"
    pretrained_checkpoint: "/home/jay/p4p/piper_training/pretrained/alan_medium/en/en_GB/alan/medium/alan-medium-stripped.ckpt"
    pi_bundle: "/home/jay/voice-pipeline/export/en_pi_bundle"

  zh:
    qwen_language: "Chinese"
    reference_audio: ""  # fill in after recording Mandarin clips
    reference_transcript: ""
    corpus: ""           # fill in when Mandarin text corpus is sourced
    espeak_voice: "cmn"
    pretrained_checkpoint: ""  # use a Piper zh_CN pretrained checkpoint
    pi_bundle: "/home/jay/voice-pipeline/export/zh_pi_bundle"

  yue:
    qwen_language: "Cantonese"
    reference_audio: ""  # fill in after recording Cantonese clips
    reference_transcript: ""
    corpus: ""           # fill in when Cantonese text corpus is sourced
    espeak_voice: "yue"
    pretrained_checkpoint: ""
    pi_bundle: "/home/jay/voice-pipeline/export/yue_pi_bundle"
